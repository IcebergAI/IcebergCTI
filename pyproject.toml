[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "iceberg"
version = "0.1.0"
description = "Cyber threat intelligence collection, authoring and dissemination platform"
requires-python = ">=3.14"
dependencies = [
    "fastapi",
    "uvicorn",
    "sqlmodel",
    "jinja2",
    "python-multipart",
    "authlib",
    "httpx",
    "pyjwt",
    "pydantic-settings",
    "itsdangerous",
    "markdown-it-py",
    "mdit-py-plugins",
    "nh3",
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
