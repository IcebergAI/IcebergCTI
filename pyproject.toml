[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "iceberg"
version = "0.1.0"
description = "Cyber threat intelligence collection, authoring and dissemination platform"
requires-python = ">=3.14"
# Version floors are anchored at the tested baseline so a fresh install can't
# silently pull an ancient (potentially vulnerable) release. These are NOT a
# full supply-chain lock — generate a lockfile (uv lock / pip-compile) pinning
# transitive dependencies before any production deployment.
dependencies = [
    "fastapi>=0.136",
    "uvicorn>=0.49",
    "sqlmodel>=0.0.38",
    "jinja2>=3.1.6",
    "python-multipart>=0.0.32",
    "authlib>=1.7",
    "httpx>=0.28",
    "pyjwt>=2.13",
    "pydantic-settings>=2.14",
    "itsdangerous>=2.2",
    "markdown-it-py>=4.2",
    "mdit-py-plugins>=0.6",
    "nh3>=0.3.5",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[project.scripts]
iceberg-seed = "iceberg.seed:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
iceberg = ["data/*.json"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
