# Iceberg on PostgreSQL — the supported container datastore. (SQLite is the
# zero-dependency local dev/test default only; it is NOT a container deployment
# option — the app refuses to boot on SQLite when ICEBERG_ENVIRONMENT=prod.)
#
#   docker compose up                  # app on :8000 + its PostgreSQL database
#   ICEBERG_DOMAIN=intel.example.com \
#     docker compose --profile tls up  # add a Caddy TLS reverse proxy on :80/:443
#
# A single app service always pairs with the `postgres` service, so no two
# services ever bind the same host port.
services:
  iceberg:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Optional overrides — a fresh clone boots with no .env (the dev defaults in
    # `environment:` below are sufficient); `required: false` keeps it optional so
    # Compose doesn't hard-fail on a missing file. Keep `required: false` to avoid
    # reintroducing the missing-.env boot blocker.
    env_file:
      - path: .env
        required: false
    environment:
      ICEBERG_ENVIRONMENT: dev
      ICEBERG_AUTO_MIGRATE: "true"
      # PostgreSQL is the container datastore. Override the credentials/host via
      # the shell or .env; the default targets the bundled `postgres` service.
      ICEBERG_DATABASE_URL: ${ICEBERG_DATABASE_URL:-postgresql+psycopg://iceberg:iceberg@postgres:5432/iceberg}
      ICEBERG_ATTACHMENTS_DIR: /data/attachments
      ICEBERG_FIGURES_DIR: /data/figures
      ICEBERG_RENDER_OUTPUT_DIR: /data/rendered
    volumes:
      - iceberg-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # No curl/wget in the slim runtime image — use the venv python (on PATH).
      # /healthz is liveness only (no DB touch), so it won't flap on a DB blip.
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)
      interval: 15s
      timeout: 5s
      retries: 5
      # First boot runs migrations + taxonomy seed inside the lifespan before
      # uvicorn serves, so /healthz isn't answerable immediately — don't count
      # failures (or report unhealthy) during the warm-up window.
      start_period: 40s

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: iceberg
      POSTGRES_PASSWORD: iceberg
      POSTGRES_DB: iceberg
    volumes:
      - iceberg-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Opt-in TLS reverse proxy for a single-host Docker deployment:
  #   ICEBERG_DOMAIN=intel.example.com docker compose --profile tls up
  # Caddy terminates TLS (automatic Let's Encrypt for a real domain; a local-CA
  # cert for the default `localhost`) and proxies to the app over the compose
  # network. For real production also set ICEBERG_ENVIRONMENT=prod in .env
  # (Secure cookies + HSTS) — uvicorn's --proxy-headers makes the app trust
  # Caddy's X-Forwarded-Proto so the scheme is correct. (For a locked-down host
  # you can also drop the `iceberg` service's published 8000 port so the app is
  # only reachable via Caddy.)
  caddy:
    profiles: ["tls"]
    image: caddy:2
    restart: unless-stopped
    depends_on:
      iceberg:
        condition: service_healthy
    environment:
      ICEBERG_DOMAIN: ${ICEBERG_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  iceberg-data:
  iceberg-pg-data:
  caddy-data:
  caddy-config:
