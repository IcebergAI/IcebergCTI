# Iceberg on PostgreSQL — the supported container datastore. (SQLite is the
# zero-dependency local dev/test default only; it is NOT a container deployment
# option — the app refuses to boot on SQLite when ICEBERG_ENVIRONMENT=prod.)
#
#   docker compose up                  # https://localhost via Caddy (local-CA cert) + PostgreSQL
#   ICEBERG_DOMAIN=intel.example.com \
#     docker compose up                # automatic Let's Encrypt TLS on the real domain
#
# Caddy is the default public entry point (:80/:443), matching the sibling
# IcebergTTX/EBS stacks; the app's plain-HTTP :8000 stays published on loopback
# only as a local/debug side door. A single app service always pairs with the
# `postgres` service, so no two services ever bind the same host port.
services:
  iceberg:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    # Optional overrides — a fresh clone boots with no .env (the dev defaults in
    # `environment:` below are sufficient); `required: false` keeps it optional so
    # Compose doesn't hard-fail on a missing file. Keep `required: false` to avoid
    # reintroducing the missing-.env boot blocker.
    env_file:
      - path: .env
        required: false
    environment:
      ICEBERG_ENVIRONMENT: ${ICEBERG_ENVIRONMENT:-dev}
      ICEBERG_AUTO_MIGRATE: ${ICEBERG_AUTO_MIGRATE:-true}
      # PostgreSQL is the container datastore. Override the credentials/host via
      # the shell or .env; the default targets the bundled `postgres` service.
      # URL-encode complex passwords, or set ICEBERG_DATABASE_URL explicitly.
      ICEBERG_DATABASE_URL: ${ICEBERG_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-iceberg}:${POSTGRES_PASSWORD:-iceberg}@postgres:5432/${POSTGRES_DB:-iceberg}}
      ICEBERG_ATTACHMENTS_DIR: /data/attachments
      ICEBERG_FIGURES_DIR: /data/figures
      ICEBERG_RENDER_OUTPUT_DIR: /data/rendered
      ICEBERG_RATE_LIMIT_REDIS_URL: ${ICEBERG_RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      # Only peers on the dedicated Compose network may supply forwarding headers.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-172.30.0.0/24}
    volumes:
      - iceberg-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # No curl/wget in the slim runtime image — use the venv python (on PATH).
      # /healthz is liveness only (no DB touch), so it won't flap on a DB blip.
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)
      interval: 15s
      timeout: 5s
      retries: 5
      # First boot runs migrations + taxonomy seed inside the lifespan before
      # uvicorn serves, so /healthz isn't answerable immediately — don't count
      # failures (or report unhealthy) during the warm-up window.
      start_period: 40s
    networks: [iceberg-internal]

  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iceberg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iceberg}
      POSTGRES_DB: ${POSTGRES_DB:-iceberg}
    volumes:
      - iceberg-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg -d iceberg"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [iceberg-internal]

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [iceberg-internal]

  # TLS reverse proxy — the default front end for a single-host Docker
  # deployment (same shape as the sibling IcebergTTX/EBS stacks). Caddy
  # terminates TLS (automatic Let's Encrypt for a real ICEBERG_DOMAIN; a
  # local-CA cert for the default `localhost`) and proxies to the app over the
  # compose network. For real production also set ICEBERG_ENVIRONMENT=prod in
  # .env (Secure cookies + HSTS), ICEBERG_AUTO_MIGRATE=false, a real
  # ICEBERG_SECRET_KEY and non-default Postgres credentials. The app's plain
  # HTTP port is bound to loopback, so Caddy is the public entry point.
  caddy-init:
    # One-shot: the named cert/config volumes initialise root-owned from the
    # image, so chown them for the non-root caddy user below (k8s does the same
    # job with fsGroup). Runs and exits before caddy starts.
    image: caddy:2-alpine
    user: "0:0"
    entrypoint: ["/bin/sh", "-c", "chown -R 1000:1000 /data /config"]
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      # Caddy creates data/caddy/{certificates,locks,pki} mode 0700 owned by uid
      # 1000. Root cannot descend into them without its DAC bypass, which
      # cap_drop ALL removed — so on every run after the first, chown -R fails
      # EPERM without DAC_READ_SEARCH.
      - DAC_READ_SEARCH
    restart: "no"
    networks: [iceberg-internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Non-root (the official image defaults to root): run as uid 1000. The caddy
    # binary ships the cap_net_bind_service file capability, so NET_BIND_SERVICE
    # must stay in the bounding set (cap_add below) — both so exec of the setcap
    # binary succeeds under cap_drop ALL and so the non-root process can bind
    # :80/:443.
    user: "1000:1000"
    depends_on:
      iceberg:
        condition: service_healthy
      caddy-init:
        condition: service_completed_successfully
    environment:
      # localhost (local-CA self-signed) | your.domain.com (Let's Encrypt)
      ICEBERG_DOMAIN: ${ICEBERG_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # issued certs — persist across restarts (required)
      - caddy-config:/config
    networks: [iceberg-internal]
    # Read-only rootfs with the cert/config stores on volumes and a writable /tmp.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp

networks:
  iceberg-internal:
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  iceberg-data:
  iceberg-pg-data:
  caddy-data:
  caddy-config:
