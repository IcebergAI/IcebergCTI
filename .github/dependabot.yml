version: 2
updates:
  # Python dependencies (pyproject floors + dev tools). The `uv` ecosystem is
  # lockfile-aware — bump PRs refresh uv.lock alongside pyproject, which the
  # `uv sync --locked` CI gate requires. Keeps the tested baselines current and
  # surfaces security bumps; pairs with pip-audit in CI. Grouped by `patterns`
  # (not `dependency-type`, which Dependabot doesn't support for the uv ecosystem)
  # into one weekly PR, matching the sibling repos.
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns:
          - "*"
    ignore:
      # Pinned to 3.2.0 in pyproject: the 3.3.x wheels omit the bundled OASIS JSON
      # schemas, which breaks STIX 2.1 validation (tests/test_stix_validation.py).
      # Un-ignore when a complete release restores those assets.
      - dependency-name: "stix2-validator"
    open-pull-requests-limit: 5

  # The SHA-pinned GitHub Actions in .github/workflows. Dependabot rewrites the
  # pin and the tracking version comment together.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # The Docker base image in the Dockerfile (digest-pinned FROM lines).
  # Dependabot bumps the python:3.14-slim @sha256 digest so base-image security
  # patches surface as PRs — the last untracked link in the supply chain.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
