version: 2
updates:
  # Python dependencies (pyproject floors + dev tools). Keeps the tested
  # baselines current and surfaces security bumps; pairs with pip-audit in CI.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-dev:
        dependency-type: development
      python-prod:
        dependency-type: production
    open-pull-requests-limit: 5

  # The SHA-pinned GitHub Actions in .github/workflows. Dependabot rewrites the
  # pin and the tracking version comment together.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # The Docker base image in the Dockerfile (digest-pinned FROM lines).
  # Dependabot bumps the python:3.14-slim @sha256 digest so base-image security
  # patches surface as PRs — the last untracked link in the supply chain.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
