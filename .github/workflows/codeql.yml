name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly — re-scans against newly shipped CodeQL queries even when the code
    # hasn't changed.
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "codeql-${{ github.ref }}"
  cancel-in-progress: true

# Dataflow/taint SAST (complements Bandit's pattern matching) over the app's
# SSRF / SQL+FTS / JWT+OIDC surfaces. Actions are pinned to a commit SHA with a
# tracking version comment, like the main CI.
jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF findings to code scanning
      actions: read            # required by codeql-action on private repos
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          languages: python
          # Superset of the default suite — security-focused, no quality noise.
          queries: security-extended
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          category: "/language:python"
