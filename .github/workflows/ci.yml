name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Lets tests/test_render.py exercise the real Typst PDF path instead of
      # skipping (it fetches the pinned cmarker package over the network once).
      - uses: typst-community/setup-typst@v3
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=iceberg --cov-report=term-missing  # fail_under enforced from pyproject

  static:
    name: Lint + security + dead code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Bandit (security)
        run: bandit -r src/iceberg
      - name: Vulture (dead code)
        run: vulture
