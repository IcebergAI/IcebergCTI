name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

# Third-party actions are pinned to a commit SHA (supply-chain hardening); the
# trailing comment tracks the human-readable version so Dependabot can bump both.
jobs:
  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      # Lets tests/test_render.py exercise the real Typst PDF path instead of
      # skipping (it fetches the pinned cmarker package over the network once).
      - uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=iceberg --cov-report=term-missing  # fail_under enforced from pyproject

  static:
    name: Lint + security + dead code + audit + frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Bandit (security)
        run: bandit -r src/iceberg
      - name: Vulture (dead code)
        run: vulture
      - name: djLint (templates)
        run: djlint src/iceberg/templates --lint
      # Biome installs as a standalone binary (no Node toolchain) and lints the
      # hand-authored CSS + Alpine component JS.
      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.5.0
      - name: Biome (frontend css/js lint)
        run: biome lint src/iceberg/static
      # Fails on a known CVE in any installed dependency (the version floors in
      # pyproject are not a lockfile). Audits the full env minus the editable
      # install; pin an unfixable advisory out with `--ignore-vuln GHSA-...`.
      - name: pip-audit (dependency CVEs)
        run: pip-audit --skip-editable

  assets:
    name: Frontend assets drift (self-hosted Tailwind/Alpine/fonts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      # Re-vendor from the pinned versions (downloads the standalone Tailwind
      # binary + Alpine + fonts) and fail if the committed assets/lock drift from
      # what the pins produce — so a stale pin or a hand-edited vendored file is
      # caught. A deliberate version bump re-runs this script and commits the diff.
      - name: Re-vendor frontend assets
        run: python scripts/vendor_assets.py
      - name: Assert no asset drift
        run: git diff --exit-code -- src/iceberg/static
