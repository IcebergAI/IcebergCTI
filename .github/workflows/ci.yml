name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  # No paths-ignore on pull_request: the `test` + `lint-workflows` jobs are
  # required status checks, so a paths-ignored PR (e.g. docs-only) would never
  # report them and deadlock on branch protection. Running the suite on a docs
  # PR is cheap on hosted runners; the push filter still skips the main re-run.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

# Third-party actions are pinned to a commit SHA (supply-chain hardening); the
# trailing comment tracks the human-readable version so Dependabot can bump both.
jobs:
  # Static checks and the asset-integrity tests live in this job rather than
  # their own: they share the same uv env, and as separate jobs their ~25s of
  # work each billed a full rounded-up minute plus a duplicate checkout+sync.
  test:
    name: Tests + coverage + static + assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.23"
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock
      # Lets tests/test_render.py exercise the real Typst PDF path instead of
      # skipping (it fetches the pinned cmarker package over the network once).
      - uses: typst-community/setup-typst@63ac138db421d586de61f7f5ac3bcef6a2e6c78c # v5.1.0
      - run: uv sync --locked --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov=iceberg --cov-report=term-missing  # fail_under enforced from pyproject
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Bandit (security)
        run: uv run bandit -r src/iceberg
      - name: Vulture (dead code)
        run: uv run vulture
      # Static type check of the pure-logic / interface modules. ORM-query-heavy
      # modules are staged out in [tool.mypy] until annotated (config in pyproject).
      - name: mypy (types)
        run: uv run mypy src/iceberg
      - name: djLint (templates)
        run: uv run djlint src/iceberg/templates --lint
      # Biome installs as a standalone binary (no Node toolchain) and lints the
      # hand-authored CSS + Alpine component JS.
      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.5.0
      - name: Biome (frontend css/js lint)
        run: biome lint src/iceberg/static
      # Fails on a known CVE in any locked dependency. Audits the full env minus
      # the editable install; pin an unfixable advisory out with
      # `--ignore-vuln GHSA-...`.
      - name: pip-audit (dependency CVEs)
        run: uv run pip-audit --skip-editable
      # Verify the committed first-party assets offline: templates must use the
      # vendored files, and every asset must match its recorded SRI hash. We do
      # not rebuild Tailwind in CI because the standalone binary output can alter
      # the committed visual bundle even when the version pin has not changed.
      - name: Verify committed frontend assets
        run: uv run pytest -q tests/test_frontend_assets.py
      - name: Assert asset verification left files untouched
        run: git diff --exit-code -- src/iceberg/static

  # The Postgres and Docker smokes run on push to main + manual dispatch only:
  # per-PR they doubled the bill re-testing what the merge push re-validates
  # anyway. A skipped job still satisfies any future required-check config.
  postgres-smoke:
    name: PostgreSQL smoke (migrate + search + queries)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
          POSTGRES_DB: iceberg
        ports:
          - 5432:5432
        # Wait for Postgres to accept connections before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U iceberg -d iceberg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The conftest honours a postgresql:// URL: it builds a real engine and
      # rebuilds the schema via `alembic upgrade head` per test (so the
      # dialect-guarded postgres_fts migration runs and the tsvector path is
      # exercised). Shared schema ⇒ run serially (-n0).
      ICEBERG_DATABASE_URL: "postgresql+psycopg://iceberg:iceberg@localhost:5432/iceberg"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.23"
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - run: uv sync --locked --extra dev --extra postgres
      # A focused subset against Postgres: search (FTS tsvector relevance/facets/
      # access scoping), dissemination, related-product visibility, and serial
      # migration/first-settings-reader race regressions. The schema is shared
      # and rebuilt per test, so this must stay serial.
      - name: Postgres smoke tests
        run: uv run pytest tests/test_postgres_smoke.py tests/test_dissemination.py tests/test_related.py -n0 -p no:cacheprovider

  docker:
    name: Docker image build + boot smoke
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # PostgreSQL is the supported container datastore (the prod image refuses to
      # boot on SQLite), so the boot smoke runs against a real Postgres.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: iceberg
          POSTGRES_PASSWORD: iceberg
          POSTGRES_DB: iceberg
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iceberg -d iceberg"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      # Build via the runner's built-in Docker/BuildKit (no extra pinned action).
      - name: Build image
        run: DOCKER_BUILDKIT=1 docker build -t iceberg:ci .
      # Scan the built image for OS/library CVEs (#166) — the base layer's Debian
      # packages and the vendored Typst binary are out of pip-audit's scope.
      # ignore-unfixed keeps the gate actionable: only vulnerabilities with a fix
      # available fail, which a Dependabot base-image digest bump then resolves.
      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: iceberg:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      # Mirror the production flow on PostgreSQL: migrate as a deploy step
      # (iceberg-migrate, ICEBERG_AUTO_MIGRATE stays false), then boot the default
      # CMD and assert the probes + that the portal templates/static are packaged
      # in the image (guards the editable-install layout in the Dockerfile).
      # --network host lets the throwaway containers reach the Postgres service on
      # the runner's mapped localhost:5432 (and the app binds :8000 on the host).
      - name: Boot smoke (migrate + run on PostgreSQL)
        env:
          ICEBERG_SECRET_KEY: ci-secret-0123456789abcdef0123456789
          ICEBERG_DATABASE_URL: postgresql+psycopg://iceberg:iceberg@localhost:5432/iceberg
        run: |
          set -euo pipefail
          docker volume create iceberg-ci-data
          docker run --rm --network host -v iceberg-ci-data:/data \
            -e ICEBERG_SECRET_KEY="$ICEBERG_SECRET_KEY" \
            -e ICEBERG_DATABASE_URL="$ICEBERG_DATABASE_URL" \
            iceberg:ci iceberg-migrate
          docker run -d --name iceberg-ci --network host -v iceberg-ci-data:/data \
            -e ICEBERG_SECRET_KEY="$ICEBERG_SECRET_KEY" \
            -e ICEBERG_DATABASE_URL="$ICEBERG_DATABASE_URL" \
            iceberg:ci
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz >/dev/null; then ready=1; break; fi
            sleep 2
          done
          if [ "${ready:-0}" != 1 ]; then echo "app did not become healthy"; exit 1; fi
          curl -fsS http://localhost:8000/readyz
          # Write to a file rather than piping into `grep -q`: under `pipefail`,
          # grep closing the pipe on first match makes curl fail with exit 23.
          curl -fsS -o login.html http://localhost:8000/auth/login
          grep -qi iceberg login.html
          curl -fsS -o /dev/null http://localhost:8000/static/css/iceberg.css
      - name: Container logs
        if: always()
        run: docker logs iceberg-ci || true

  # Lints the workflow files themselves so the SHA-pinning / least-privilege
  # posture cannot silently regress. Both tools are blocking.
  lint-workflows:
    name: lint-workflows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.23"
          python-version: "3.14"
      # zizmor: CI/CD security audit (unpinned actions, artipacked, template
      # injection, excessive permissions). Version-pinned; GH_TOKEN enables its
      # online audits (impostor commits, known-vulnerable actions).
      - name: zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor@1.27.0 .github/workflows/
      # actionlint: syntax + shellcheck over every run: block. Installed from the
      # Go module proxy at a pinned version and verified by Go's checksum database
      # (sum.golang.org) rather than trusting a third-party action.
      - name: actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint" -color
