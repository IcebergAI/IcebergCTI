name: Bug report
description: Report a defect in Iceberg
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. **Do not report security
        vulnerabilities here** — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ..., Iceberg did ..., but I expected ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the behaviour.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which Iceberg version or commit SHA are you running?
      placeholder: e.g. main @ 502fad1
    validations:
      required: true
  - type: dropdown
    id: datastore
    attributes:
      label: Datastore
      options:
        - PostgreSQL
        - SQLite (dev/test)
        - Not sure
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Deployment / environment
      description: OS, container vs local, behind a proxy, etc.
      placeholder: e.g. Docker on k8s behind nginx ingress
    validations:
      required: false
