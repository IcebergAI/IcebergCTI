# Pre-commit hooks mirroring the CI lint / security / dead-code gate
# (.github/workflows/ci.yml) so the same checks run locally on every commit and
# never need to be invoked by hand.
#
# These are `repo: local` + `language: system` hooks: they run the tools pinned
# in the dev extra (pyproject `[project.optional-dependencies].dev`) from the
# active environment, so the pinned versions are the single source of truth and
# local hooks match CI exactly. Install once with `pre-commit install` after
# `pip install -e ".[dev]"`.
#
# Each hook runs its full configured scope (pass_filenames: false) rather than
# only the staged files — vulture needs whole-program analysis, bandit scans the
# package tree, and ruff honours its pyproject excludes — matching CI's `ruff
# check .` / `bandit -r src/iceberg` / `vulture`.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: ruff check .
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: bandit
        name: bandit (security)
        entry: bandit -r src/iceberg
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: vulture
        name: vulture (dead code)
        entry: vulture
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
