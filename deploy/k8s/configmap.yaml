apiVersion: v1
kind: ConfigMap
metadata:
  name: iceberg-config
data:
  ICEBERG_ENVIRONMENT: "prod"
  ICEBERG_AUTO_MIGRATE: "false"
  # Datastore: SQLite by default. For PostgreSQL, move the URL to the
  # iceberg-secrets Secret (it carries credentials) and drop it here, e.g.
  #   ICEBERG_DATABASE_URL: postgresql+psycopg://user:pass@host:5432/iceberg
  # Run the migrate Job (alembic upgrade head) against it before/at rollout.
  # See deploy/k8s/README.md and deploy/k8s/postgres.yaml.
  ICEBERG_DATABASE_URL: "sqlite:////data/iceberg.db"
  ICEBERG_ATTACHMENTS_DIR: "/data/attachments"
  ICEBERG_FIGURES_DIR: "/data/figures"
  ICEBERG_RENDER_OUTPUT_DIR: "/data/rendered"
  ICEBERG_DEV_AUTH: "false"
  ICEBERG_PORTAL_BASE_URL: "https://iceberg.example.com"
