apiVersion: v1
kind: ConfigMap
metadata:
  name: iceberg-config
data:
  ICEBERG_ENVIRONMENT: "prod"
  ICEBERG_AUTO_MIGRATE: "false"
  # Datastore: PostgreSQL (required in prod — the app refuses to boot on SQLite).
  # ICEBERG_DATABASE_URL carries credentials, so it lives in the iceberg-secrets
  # Secret, not here. Run the migrate Job (alembic upgrade head) against it
  # before/at rollout. See deploy/k8s/README.md and deploy/k8s/postgres.yaml.
  ICEBERG_ATTACHMENTS_DIR: "/data/attachments"
  ICEBERG_FIGURES_DIR: "/data/figures"
  ICEBERG_RENDER_OUTPUT_DIR: "/data/rendered"
  ICEBERG_DEV_AUTH: "false"
  ICEBERG_PORTAL_BASE_URL: "https://iceberg.example.com"
  # Login: production auth is Microsoft Entra OIDC. With dev-auth off (above) and
  # OIDC unset there is NO usable login path — uncomment + fill these and put
  # ICEBERG_OIDC_CLIENT_SECRET in the iceberg-secrets Secret. The redirect URI is
  # ICEBERG_PORTAL_BASE_URL + /auth/callback and must match the Entra app
  # registration. See "Authentication / Login" in deploy/k8s/README.md. For a
  # quick OIDC-free evaluation, apply configmap.beta.yaml instead of this file.
  # ICEBERG_OIDC_ENABLED: "true"
  # ICEBERG_OIDC_TENANT_ID: "<tenant-guid>"
  # ICEBERG_OIDC_CLIENT_ID: "<app-client-id>"
  # ICEBERG_OIDC_REDIRECT_URI: "https://iceberg.example.com/auth/callback"
  # Rate limiting: enabled automatically in prod. Keep any credential-bearing
  # ICEBERG_RATE_LIMIT_REDIS_URL in the iceberg-secrets Secret.
  ICEBERG_RATE_LIMIT_STORE: "auto"
