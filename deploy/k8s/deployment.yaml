apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: iceberg
  template:
    metadata:
      labels:
        app: iceberg
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: iceberg
          image: ghcr.io/theslopbucket/iceberg:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: iceberg-config
            - secretRef:
                name: iceberg-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: iceberg-data
