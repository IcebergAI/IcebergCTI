# Template for the `iceberg-secrets` Secret referenced by deployment.yaml and
# migrate-job.yaml. DO NOT commit real values — copy to secret.yaml, fill in,
# and apply (or manage via your secrets tooling: Sealed Secrets, External
# Secrets, SOPS, a cloud secret store, etc.).
#
#   cp secret.example.yaml secret.yaml   # then edit + `kubectl apply -f secret.yaml`
apiVersion: v1
kind: Secret
metadata:
  name: iceberg-secrets
type: Opaque
stringData:
  # Required: a unique signing key of at least 32 chars (the app refuses to boot
  # in prod with the built-in default). Generate e.g. `openssl rand -hex 32`.
  ICEBERG_SECRET_KEY: "change-me-to-a-unique-32+-char-secret"

  # Required: the PostgreSQL datastore URL (carries credentials, so it lives in
  # the Secret, not the ConfigMap). SQLite is not a supported deployment
  # datastore — the prod app refuses to boot on it.
  ICEBERG_DATABASE_URL: "postgresql+psycopg://iceberg:CHANGEME@postgres:5432/iceberg"

  # Other secrets, as used (kept out of the ConfigMap):
  #   ICEBERG_OIDC_CLIENT_SECRET, ICEBERG_AUDIT_HTTP_TOKEN, ICEBERG_MISP_API_KEY,
  #   ICEBERG_PROXY_USERNAME / ICEBERG_PROXY_PASSWORD, ICEBERG_WEBHOOK_TOKEN,
  #   ICEBERG_AI_API_KEY, ICEBERG_SMTP_PASSWORD.

  # Recommended in production: a managed Redis URL for shared rate-limit buckets
  # across uvicorn workers/pods. Treat as secret-capable if your Redis URL embeds
  # credentials.
  # ICEBERG_RATE_LIMIT_REDIS_URL: "redis://redis.example.internal:6379/0"
