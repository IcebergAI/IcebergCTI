apiVersion: batch/v1
kind: Job
metadata:
  name: iceberg-migrate
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/theslopbucket/iceberg:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: iceberg-config
            - secretRef:
                name: iceberg-secrets
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: iceberg-data
